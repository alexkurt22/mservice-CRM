name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Generate system files
        run: flutter create --platforms=android .

      - name: Install dependencies
        run: flutter pub get

      # ❗ НАШ МАГИЧЕСКИЙ БЛОК: ИСПРАВЛЯЕТ ВЕРСИИ ANDROID SDK ❗
      - name: Fix Android SDK versions
        run: |
          find /home/runner/.pub-cache/hosted -name "build.gradle" -type f -exec sed -i 's/compileSdkVersion 33/compileSdkVersion 34/g' {} +
          find /home/runner/.pub-cache/hosted -name "build.gradle" -type f -exec sed -i 's/compileSdk 33/compileSdk 34/g' {} +
          sed -i 's/compileSdk = 33/compileSdk = 34/g' android/app/build.gradle.kts 2>/dev/null || true
          sed -i 's/targetSdk = 33/targetSdk = 34/g' android/app/build.gradle.kts 2>/dev/null || true
          sed -i 's/compileSdkVersion 33/compileSdkVersion 34/g' android/app/build.gradle 2>/dev/null || true
          sed -i 's/targetSdkVersion 33/targetSdkVersion 34/g' android/app/build.gradle 2>/dev/null || true


      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/mservice_crm.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          # Робот возьмет текст твоего коммита (например "база плюс профиль") и сделает его названием архива!
          name: mservice_crm_${{ github.event.head_commit.message }}
          path: build/app/outputs/flutter-apk/mservice_crm.apk

